<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — WebDAV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <div class="mb-8 text-center">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-server text-white text-xl"></i>
      </div>
      <h1 class="text-xl font-bold text-gray-900">WebDAV File Server</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to access your files</p>
    </div>

    {{if .Error}}
    <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700 flex items-center gap-2">
      <i class="fa-solid fa-circle-exclamation shrink-0"></i>
      {{.Error}}
    </div>
    {{end}}

    {{if .ShowOIDC}}
    <a href="/auth/login"
       class="flex items-center justify-center gap-2 w-full px-4 py-2.5 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-colors">
      <i class="fa-solid fa-key"></i>
      Sign in with SSO
    </a>
    {{end}}

    {{if and .ShowOIDC .ShowBasic}}
    <div class="my-5 flex items-center gap-3">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">or</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>
    {{end}}

    {{if .ShowBasic}}
    <form method="POST" action="/auth/basic-sign-in" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1" for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username"
               class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
               class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <button type="submit"
              class="flex items-center justify-center gap-2 w-full px-4 py-2.5 text-sm font-medium bg-gray-900 text-white rounded-lg hover:bg-gray-800 active:bg-gray-700 transition-colors">
        Sign in
      </button>
    </form>
    {{end}}
  </div>
</body>
</html>
